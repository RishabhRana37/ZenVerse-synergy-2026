scenario: db-cascade
description: "PostgreSQL primary disk exhaustion cascading through the order service path"

services:
  - name: postgres-primary
  - name: redis-cache
  - name: auth-svc
    depends_on: [postgres-primary]
  - name: order-svc
    depends_on: [postgres-primary, redis-cache]
  - name: api-gateway
    depends_on: [auth-svc, order-svc]
  - name: payment-svc
    depends_on: [postgres-primary]
  - name: notification-svc
    depends_on: [order-svc]

failure_script:
  - t: 0
    service: postgres-primary
    event: disk_full
  - t: 5
    service: order-svc
    event: connection_timeout
  - t: 8
    service: auth-svc
    event: connection_timeout
  - t: 10
    service: payment-svc
    event: connection_timeout
  - t: 14
    service: api-gateway
    event: upstream_error
  - t: 18
    service: notification-svc
    event: upstream_error

background_noise_rate: 2.0   # alerts/s from unrelated services

# eps tuned separately from the AIOps default (see eval/results/db-cascade_*):
# a 90s, 6-service cascade is a much denser/faster regime than a day-long
# single-host anomaly stream, and the aiops-tuned eps=0.20 fragments this
# single incident into 12 separate cards. 0.35 is a middle ground — still not
# a fully unified card (frag~3, a known open gap — see distance.py's
# topology_bonus, which is too weak to bridge cascade tiers with legitimately
# different symptom text), but the true root cause lands in the top-3
# candidates (Hit@3=100%), consistent with the "ranked candidates, never a
# single verdict" design the demo script itself narrates.
clustering:
  eps: 0.35
  min_samples: 3
