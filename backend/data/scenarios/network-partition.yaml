scenario: network-partition
description: "Network switch failure isolating the datacenter-b rack"

services:
  - name: switch-dc-b
  - name: db-replica-b
    depends_on: [switch-dc-b]
  - name: cache-b
    depends_on: [switch-dc-b]
  - name: worker-b
    depends_on: [db-replica-b, cache-b]
  - name: api-gateway
    depends_on: [worker-b]
  - name: load-balancer
    depends_on: [api-gateway]

failure_script:
  - t: 0
    service: switch-dc-b
    event: network_partition
  - t: 3
    service: db-replica-b
    event: connection_timeout
  - t: 3
    service: cache-b
    event: connection_timeout
  - t: 8
    service: worker-b
    event: upstream_error
  - t: 12
    service: api-gateway
    event: upstream_error

background_noise_rate: 1.5

# Same rationale as db-cascade: a short, dense synthetic cascade needs a
# looser eps than the aiops-tuned default (0.20) or it fragments into a
# dozen cards. Measured: eps=0.20 -> frag=13; eps=0.35 -> frag=4, Hit@1/3=100%.
clustering:
  eps: 0.35
  min_samples: 3
